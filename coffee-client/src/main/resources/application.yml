spring:
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
  datasource:
    url: jdbc:postgresql://localhost:5432/coffee_order
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

venue:
  id: ${VENUE_ID:}

app:
  map-api-key: ${MAP_API_KEY:f80fc89f-34ed-4464-a287-513c718fd9aa}

payment:
  base-url: ${PAYMENT_BASE_URL:https://paybox.wisterk.me}
  api-key: ${PAYMENT_API_KEY:123qwe}

jwt:
  secret: ${JWT_SECRET:coffee-order-secret-key-that-is-at-least-256-bits-long-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}
