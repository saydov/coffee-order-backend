<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен</title>
    <style>
        :root {
            --color-accent: #FF6900;
            --color-background: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #888888;
            --color-text-inverse: #ffffff;
            --color-success: #43a047;

            --font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --radius-xl: 24px;
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-family);
            background: var(--color-background);
            color: var(--color-text);
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .result-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            max-width: 440px;
            padding: 48px 32px;
            border-radius: var(--radius-xl);
            background: var(--color-surface);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .result-card__icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(67, 160, 71, 0.1);
            font-size: 40px;
        }

        .result-card__title {
            font-size: 24px;
            font-weight: 700;
        }

        .result-card__order-number {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 9999px;
            background: var(--color-background);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--color-accent);
        }

        .result-card__text {
            color: var(--color-text-muted);
            font-size: 16px;
            line-height: 1.5;
        }

        .result-card__btn {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 16px;
            background: var(--color-accent);
            color: var(--color-text-inverse);
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .result-card__btn:hover {
            background: #e05e00;
        }
    </style>
</head>
<body>

<div class="result-card">
    <div class="result-card__icon">✓</div>
    <h1 class="result-card__title">Заказ оформлен!</h1>
    <div class="result-card__order-number" th:text="'#' + ${orderNumber}">
        #A1B2C3
    </div>
    <p class="result-card__text">
        Ваш заказ принят и скоро начнёт готовиться.<br>
        Следите за статусом на табло заказов.
    </p>
    <a class="result-card__btn" href="/">Вернуться в меню</a>
</div>

</body>
</html>
